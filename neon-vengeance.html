<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NEON VENGEANCE</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body{margin:0;height:100%;background:#07040d;overflow:hidden}
  body{display:grid;place-items:center}
  #wrap{position:relative;box-shadow:0 0 120px rgba(255,45,150,.18), inset 0 0 0 1px rgba(255,255,255,.04)}
  canvas{display:block;background:#0b0716}
  /* CRT scanlines + vignette */
  #crt{position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,.55) 100%),
      repeating-linear-gradient(to bottom, rgba(0,0,0,.22) 0px, rgba(0,0,0,.22) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:multiply}
  #crt::after{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(to right, rgba(255,0,80,.02) 0 1px, rgba(0,255,255,.02) 1px 2px, transparent 2px 3px)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="960" height="540"></canvas>
  <div id="crt"></div>
</div>
<script>
'use strict';
// ============================================================ setup
const cv = document.getElementById('cv'), cx = cv.getContext('2d');
const W = 960, H = 540, GROUND = 464, HORIZON = 286;
function fit(){
  const s = Math.min(innerWidth / W, innerHeight / H);
  cv.style.width = (W * s) + 'px'; cv.style.height = (H * s) + 'px';
}
addEventListener('resize', fit); fit();

let store = { get(k){ try { return localStorage.getItem(k); } catch(e){ return null; } },
              set(k,v){ try { localStorage.setItem(k,v); } catch(e){} } };
let hi = +(store.get('nv_hi') || 0);
let muted = store.get('nv_mute') === '1';

// ============================================================ input
const keys = new Set();
const LEFT = ['ArrowLeft','KeyA'], RIGHT = ['ArrowRight','KeyD'];
const JUMP = ['Space','ArrowUp','KeyW'], FIRE = ['KeyJ','KeyX','KeyZ'];
const DOWN = ['ArrowDown','KeyS'];
const down = list => list.some(k => keys.has(k));

addEventListener('keydown', e => {
  if ([...LEFT, ...RIGHT, ...JUMP, ...FIRE, ...DOWN, 'Enter'].includes(e.code)) e.preventDefault();
  ensureAudio();
  keys.add(e.code);
  if (e.repeat) return;
  if (e.code === 'KeyM'){ muted = !muted; store.set('nv_mute', muted ? '1' : '0'); applyMute(); }
  if (state === 'title' && e.code === 'Enter') startRun();
  else if (state === 'dead'){
    if (e.code === 'Enter') startRun();
    if (e.code === 'Escape') state = 'title';
  }
  else if (state === 'play'){
    if (e.code === 'KeyP' || e.code === 'Escape') paused = !paused, syncAudioSuspend();
    if (paused && e.code === 'KeyR') startRun(); // reset the run from the pause screen
    if (!paused && JUMP.includes(e.code)) tryJump();
  }
});
addEventListener('keyup', e => keys.delete(e.code));
addEventListener('pointerdown', ensureAudio);
addEventListener('blur', () => { if (state === 'play') paused = true; syncAudioSuspend(); });
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state === 'play') paused = true;
  syncAudioSuspend();
});

// ============================================================ audio — procedural synthwave
let AC = null, master, musicGain, sfxGain, leadBus, echoIn, noiseBuf, tempoDelay = null;
let mStep = 0, nextT = 0;

// ---- soundtracks: each is 8 bars. A run picks one of the non-boss themes at
//      random; the mid-boss swaps in one of the darker boss themes (boss: true).
const SONGS = [
  { name: 'NIGHT RUN', bpm: 112,
    roots:  [33,33,29,29,36,36,31,31],
    chords: [[57,60,64],[57,60,64],[53,57,60],[53,57,60],[60,64,67],[60,64,67],[55,59,62],[55,59,62]],
    bpat:   [0,0,12,0,0,0,12,7],
    melody: [69,0,72,0,76,0,74,72, 69,0,72,0,76,0,79,76,
             77,0,76,0,72,0,69,72, 74,72,69,0,0,0,67,69,
             72,0,76,0,79,0,76,72, 74,0,72,0,69,0,72,74,
             79,0,78,0,74,0,71,74, 76,74,71,0,69,0,0,0],
    penta:  [69,72,74,76,79,81,84,88] },
  { name: 'MIDNIGHT DRIVE', bpm: 120,
    roots:  [28,28,36,36,31,31,38,38],
    chords: [[52,55,59],[52,55,59],[48,52,55],[48,52,55],[55,59,62],[55,59,62],[50,54,57],[50,54,57]],
    bpat:   [0,0,7,0,0,12,0,7],
    melody: [64,0,67,0,71,0,69,67, 64,0,67,0,71,0,74,71,
             72,0,71,0,67,0,64,67, 67,0,64,0,0,0,62,64,
             67,0,71,0,74,0,71,67, 69,0,67,0,64,0,67,69,
             74,0,73,0,69,0,66,69, 71,69,66,0,64,0,0,0],
    penta:  [64,67,69,71,74,76,79,83] },
  { name: 'AFTERBURNER', bpm: 132,
    roots:  [33,33,31,31,29,29,28,28],
    chords: [[57,60,64],[57,60,64],[55,59,62],[55,59,62],[53,57,60],[53,57,60],[52,56,59],[52,56,59]],
    bpat:   [0,0,12,7,0,0,12,0],
    melody: [69,0,72,0,76,0,74,72, 69,71,72,0,76,0,79,76,
             74,0,71,0,67,0,71,74, 79,0,76,0,74,0,71,67,
             72,0,69,0,65,0,69,72, 77,0,72,0,69,0,72,77,
             80,0,76,0,71,0,68,71, 80,79,76,0,71,0,0,0],
    penta:  [69,72,74,76,80,81,84,88] },
  { name: 'NEON TIDE', bpm: 126,
    roots:  [36,36,31,31,33,33,29,29],
    chords: [[60,64,67],[60,64,67],[55,59,62],[55,59,62],[57,60,64],[57,60,64],[53,57,60],[53,57,60]],
    bpat:   [0,0,7,0,0,12,0,7],
    melody: [72,0,76,0,79,0,76,74, 72,0,76,0,81,0,79,76,
             74,0,71,0,74,0,79,74, 71,0,74,0,71,0,67,71,
             69,0,72,0,76,0,72,69, 81,0,79,0,76,0,72,76,
             77,0,76,0,72,0,69,72, 74,72,69,0,72,0,0,0],
    penta:  [72,74,76,79,81,84,86,88] },
  { name: 'VHS GHOST', bpm: 96,
    roots:  [38,38,34,34,29,29,33,33],
    chords: [[50,53,57],[50,53,57],[46,50,53],[46,50,53],[53,57,60],[53,57,60],[45,49,52],[45,49,52]],
    bpat:   [0,0,0,7,0,0,0,12],
    melody: [62,0,0,0,65,0,69,0, 74,0,0,0,69,0,65,62,
             70,0,0,0,65,0,0,62, 65,0,0,0,62,0,0,0,
             65,0,0,0,69,0,72,0, 72,0,0,0,69,0,65,69,
             64,0,0,0,61,0,0,0, 69,0,68,0,64,0,0,0],
    penta:  [62,65,67,69,72,74,77,81] },
  { name: 'IRON COLOSSUS', bpm: 100, heavy: true, boss: true,
    roots:  [26,26,34,34,26,26,25,25],
    chords: [[50,53,57],[50,53,57],[46,50,53],[46,50,53],[50,53,57],[50,53,57],[45,49,52],[45,49,52]],
    bpat:   [0,0,0,12,0,0,0,7],
    melody: [62,0,0,0,65,0,0,62, 62,0,0,0,69,0,68,0,
             58,0,0,0,62,0,0,58, 58,0,57,0,0,0,0,0,
             62,0,0,0,65,0,69,0, 74,0,0,0,69,0,65,62,
             61,0,0,0,64,0,0,0, 64,63,61,0,0,0,0,0],
    penta:  [62,65,69,72,74,77,81,84] },
  { name: 'VOID ENGINE', bpm: 92, heavy: true, boss: true,
    roots:  [28,28,29,29,28,28,26,26],
    chords: [[52,55,59],[52,55,59],[53,57,60],[53,57,60],[52,55,59],[52,55,59],[50,54,57],[50,54,57]],
    bpat:   [0,0,12,0,0,7,0,12],
    melody: [64,0,0,0,67,0,0,64, 71,0,0,0,67,0,65,64,
             65,0,0,0,69,0,0,65, 72,0,0,0,65,0,0,0,
             64,0,0,0,67,0,71,0, 74,0,0,0,71,0,67,64,
             66,0,0,0,62,0,0,0, 69,0,66,0,62,0,0,0],
    penta:  [64,67,69,71,74,76,79,83] }
];
function songIdxsWhere(boss){ const a = []; for (let i = 0; i < SONGS.length; i++) if (!!SONGS[i].boss === boss) a.push(i); return a; }
function pickRunSong(){ const a = songIdxsWhere(false); return a[Math.random() * a.length | 0]; }
function pickBossSong(){ const a = songIdxsWhere(true); return a[Math.random() * a.length | 0]; }
let songIdx = 0, song = SONGS[0], prevSong = 0;
let SPB = 60 / song.bpm;
function setSong(i){
  songIdx = i; song = SONGS[i]; SPB = 60 / song.bpm;
  if (tempoDelay) tempoDelay.delayTime.value = SPB * 0.75;
}

function ensureAudio(){
  if (AC){ if (AC.state === 'suspended' && !document.hidden) AC.resume(); return; }
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -16; comp.ratio.value = 5; comp.connect(AC.destination);
    master = AC.createGain(); master.connect(comp);
    musicGain = AC.createGain(); musicGain.gain.value = 0.5; musicGain.connect(master);
    sfxGain = AC.createGain(); sfxGain.gain.value = 0.65; sfxGain.connect(master);
    // lead chain: detuned saws -> distortion -> post gain -> (dry + tempo delay)
    const shaper = AC.createWaveShaper();
    const curve = new Float32Array(1024);
    for (let i = 0; i < 1024; i++){ const x = i / 511.5 - 1; curve[i] = Math.tanh(3.2 * x); }
    shaper.curve = curve; shaper.oversample = '2x';
    leadBus = AC.createGain(); leadBus.gain.value = 1; leadBus.connect(shaper);
    const post = AC.createGain(); post.gain.value = 0.45; shaper.connect(post); post.connect(musicGain);
    const dly = AC.createDelay(1); dly.delayTime.value = SPB * 0.75; tempoDelay = dly;
    const fb = AC.createGain(); fb.gain.value = 0.32;
    const wet = AC.createGain(); wet.gain.value = 0.33;
    echoIn = AC.createGain(); echoIn.gain.value = 1;
    post.connect(echoIn); echoIn.connect(dly); dly.connect(fb); fb.connect(dly); dly.connect(wet); wet.connect(musicGain);
    noiseBuf = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    applyMute();
    nextT = AC.currentTime + 0.1;
    setInterval(scheduler, 25);
  } catch(e){ AC = null; }
}
function applyMute(){ if (master) master.gain.value = muted ? 0 : 0.9; }
function syncAudioSuspend(){
  if (!AC) return;
  if ((state === 'play' && paused) || document.hidden) AC.suspend();
  else AC.resume();
}
function noiseSrc(t, dur){
  const s = AC.createBufferSource(); s.buffer = noiseBuf; s.loop = true;
  s.start(t); s.stop(t + dur); return s;
}
function hz(m){ return 440 * Math.pow(2, (m - 69) / 12); }

function scheduler(){
  if (!AC || AC.state !== 'running') { if (AC) nextT = AC.currentTime + 0.1; return; }
  while (nextT < AC.currentTime + 0.13){
    stepMusic(mStep, nextT);
    nextT += SPB / 4; mStep = (mStep + 1) % 128;
  }
}
function stepMusic(s, t){
  const bar = (s >> 4) % 8, p = s & 15;
  const playing = state === 'play';
  const heavy = song.heavy;
  // drums
  if (p % 4 === 0) kick(t, heavy);
  if (heavy && p % 4 === 2) kick(t, true); // boss: pounding double-time low end
  if (playing && (p === 4 || p === 12)) snare(t);
  hat(t, p % 4 === 2 ? 0.14 : 0.05);
  // bass — driving 8ths
  if (p % 2 === 0) bassNote(song.roots[bar] + song.bpat[p / 2], t, SPB * 0.45);
  // arp sparkle on 16ths
  const ch = song.chords[bar];
  arpNote(ch[p % 3] + (p % 2 ? 12 : 0), t);
  // lead: the song's own melody plays throughout (OVERDRIVE keeps the normal track)
  if (playing && p % 2 === 0){
    const n = song.melody[bar * 8 + p / 2];
    if (n) leadNote(n, t, SPB * 0.42, 0.16);
  }
}
function kick(t, heavy){
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(heavy ? 185 : 155, t); o.frequency.exponentialRampToValueAtTime(heavy ? 38 : 44, t + (heavy ? 0.14 : 0.11));
  g.gain.setValueAtTime(heavy ? 1 : 0.85, t); g.gain.exponentialRampToValueAtTime(0.001, t + (heavy ? 0.2 : 0.16));
  o.connect(g); g.connect(musicGain); o.start(t); o.stop(t + (heavy ? 0.22 : 0.18));
}
function snare(t){
  const n = noiseSrc(t, 0.2), f = AC.createBiquadFilter(), g = AC.createGain();
  f.type = 'bandpass'; f.frequency.value = 1900; f.Q.value = 0.8;
  g.gain.setValueAtTime(0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.17);
  n.connect(f); f.connect(g); g.connect(musicGain);
  const o = AC.createOscillator(), g2 = AC.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(190, t);
  g2.gain.setValueAtTime(0.25, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  o.connect(g2); g2.connect(musicGain); o.start(t); o.stop(t + 0.12);
}
function hat(t, v){
  const n = noiseSrc(t, 0.05), f = AC.createBiquadFilter(), g = AC.createGain();
  f.type = 'highpass'; f.frequency.value = 7500;
  g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  n.connect(f); f.connect(g); g.connect(musicGain);
}
function bassNote(m, t, d){
  const o = AC.createOscillator(), f = AC.createBiquadFilter(), g = AC.createGain();
  o.type = 'sawtooth'; o.frequency.value = hz(m);
  f.type = 'lowpass'; f.frequency.setValueAtTime(900, t); f.frequency.exponentialRampToValueAtTime(220, t + d);
  g.gain.setValueAtTime(0.34, t); g.gain.exponentialRampToValueAtTime(0.001, t + d);
  o.connect(f); f.connect(g); g.connect(musicGain); o.start(t); o.stop(t + d + 0.02);
}
function arpNote(m, t){
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'square'; o.frequency.value = hz(m + 12);
  g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  o.connect(g); g.connect(echoIn || musicGain); o.start(t); o.stop(t + 0.12);
}
function leadNote(m, t, d, v){
  for (const det of [-6, 6]){
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sawtooth'; o.frequency.value = hz(m); o.detune.value = det;
    g.gain.setValueAtTime(0.0001, t); g.gain.linearRampToValueAtTime(v, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, t + d);
    o.connect(g); g.connect(leadBus); o.start(t); o.stop(t + d + 0.02);
  }
}
// ---- sfx
function sweep(type, f0, f1, d, v, dest){
  if (!AC || AC.state !== 'running') return;
  const t = AC.currentTime, o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f0, t); o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + d);
  g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(0.001, t + d);
  o.connect(g); g.connect(dest || sfxGain); o.start(t); o.stop(t + d + 0.02);
}
function sShoot(){ sweep('square', 880, 220, 0.07, 0.1); }
function sLaser(){ sweep('sawtooth', 1400, 280, 0.12, 0.12); }
function sJump(){ sweep('square', 280, 620, 0.12, 0.07); }
function sHurt(){ sweep('sawtooth', 210, 55, 0.25, 0.25); }
function sPickup(){ sweep('sine', 760, 760, 0.06, 0.14); setTimeout(() => sweep('sine', 1140, 1140, 0.1, 0.14), 70); }
function sBoom(big){
  if (!AC || AC.state !== 'running') return;
  const t = AC.currentTime, dur = big ? 0.65 : 0.35;
  const n = noiseSrc(t, dur), f = AC.createBiquadFilter(), g = AC.createGain();
  f.type = 'lowpass'; f.frequency.setValueAtTime(big ? 1400 : 900, t); f.frequency.exponentialRampToValueAtTime(80, t + dur);
  g.gain.setValueAtTime(big ? 0.7 : 0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  n.connect(f); f.connect(g); g.connect(sfxGain);
  sweep('sine', 110, 28, dur, big ? 0.5 : 0.3);
}
function sShield(){ sweep('sine', 320, 1200, 0.18, 0.16); sweep('triangle', 640, 240, 0.22, 0.1); }
function sShieldHit(){ sweep('triangle', 900, 180, 0.18, 0.2); }
function sRocket(){ sweep('square', 180, 520, 0.18, 0.12); }
function sMech(){ sweep('sawtooth', 90, 360, 0.35, 0.2); sweep('square', 420, 110, 0.4, 0.12); }
function sMechHit(){ sweep('square', 420, 90, 0.16, 0.22); }
function sCar(){ sweep('sawtooth', 70, 180, 0.45, 0.2); sweep('square', 150, 320, 0.3, 0.12); }
function sThunder(){
  if (!AC || AC.state !== 'running') return;
  const t = AC.currentTime, n = noiseSrc(t, 0.7), f = AC.createBiquadFilter(), g = AC.createGain();
  f.type = 'lowpass'; f.frequency.setValueAtTime(420, t); f.frequency.exponentialRampToValueAtTime(60, t + 0.7);
  g.gain.setValueAtTime(0.0001, t); g.gain.linearRampToValueAtTime(0.16, t + 0.05); g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
  n.connect(f); f.connect(g); g.connect(sfxGain);
}
function sSolo(){
  // a deep, menacing surge instead of a shrill rising sweep
  sweep('sawtooth', 70, 240, 0.6, 0.24);
  sweep('square', 150, 60, 0.6, 0.14);
  if (AC && AC.state === 'running'){
    const t = AC.currentTime, n = noiseSrc(t, 0.6), f = AC.createBiquadFilter(), g = AC.createGain();
    f.type = 'lowpass'; f.frequency.setValueAtTime(1600, t); f.frequency.exponentialRampToValueAtTime(180, t + 0.6);
    g.gain.setValueAtTime(0.28, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    n.connect(f); f.connect(g); g.connect(sfxGain);
  }
}

// ============================================================ game state
let state = 'title', paused = false, tt = 0, shake = 0, eid = 0;
let G = null;

function startRun(){
  paused = false;
  G = {
    p: { x: 120, y: GROUND, vx: 0, vy: 0, onGround: true, jumps: 0, facing: 1,
         hp: 4, iframes: 0, fireCd: 0, flash: 0, animT: 0, dropT: 0,
         weapon: 'std', weaponT: 0, soloT: 0, shield: 0, shieldT: 0,
         mech: 0, mechT: 0, carT: 0, carAng: Math.PI / 3 },
    camX: 0, maxD: 0, score: 0, meter: 0,
    ens: [], pbul: [], ebul: [], parts: [], picks: [], texts: [], plats: [],
    allies: [], pods: [], cars: [], flyerT: 0,
    genX: 420, spawnX: 760, nextStalker: 2000, nextBoss: 1200, nextAlly: 3200, nextGunship: 3500, nextCar: 2500,
    bossOn: false, dieT: 0, line: '',
    zone: 0, boltT: 2.5, flashT: 0, boltX: 0,
    kills: 0, bosses: 0, runT: 0
  };
  // pick a fresh soundtrack for the run (never a boss theme)
  setSong(pickRunSong());
  prevSong = songIdx;
  // a welcome-mat platform with a star on it
  G.plats.push({ x: 430, y: 372, w: 170 });
  G.picks.push(mkPick('star', 515, 372 - 22));
  state = 'play';
  syncAudioSuspend();
}
function enterBoss(msg, col){
  if (G.bossOn) return;
  G.bossOn = true; prevSong = songIdx; setSong(pickBossSong());
  addText(G.camX + W / 2, 130, msg || '⚠ MID-BOSS INCOMING ⚠', col || '#c44dff', 2.6);
  shake = 12;
}
function exitBoss(){
  if (!G.bossOn) return;
  G.bossOn = false; setSong(prevSong);
}

function mkPick(type, x, y){ return { type, x, y, w: 22, h: 22, t: Math.random() * 9 }; }
function randPickup(){
  const r = Math.random();
  if (r < 0.30) return 'star';
  if (r < 0.46) return 'hp';
  if (r < 0.58) return 'shield';
  if (r < 0.70) return 'spread';
  if (r < 0.82) return 'laser';
  if (r < 0.92) return 'rapid';
  return 'rocket';
}

function mkEnemy(type, x){
  const e = { id: ++eid, type, x, hp: 1, t: Math.random() * 9, cd: 1 + Math.random(), face: -1, vy: 0 };
  if (type === 'grunt'){ e.y = GROUND; e.w = 24; e.h = 42; e.hp = 2; e.spd = 55 + Math.random() * 40; }
  if (type === 'heavy'){ e.y = GROUND; e.w = 34; e.h = 46; e.hp = 6; e.spd = 32; }
  if (type === 'drone'){ e.baseY = 300 + Math.random() * 90; e.y = e.baseY; e.w = 26; e.h = 18; e.hp = 1; e.spd = 95; }
  if (type === 'flyer'){ e.baseY = 90 + Math.random() * 250; e.y = e.baseY; e.w = 24; e.h = 16; e.hp = 1; e.spd = 50 + Math.random() * 80; e.vyb = Math.random() * 9; }
  if (type === 'stalker'){ e.y = GROUND; e.w = 28; e.h = 58; e.hp = 26; e.spd = 70;
    e.phase = 'cloak'; e.pt = 2.6; e.hitT = 0; }
  if (type === 'midboss'){ e.y = GROUND; e.w = 42; e.h = 60; e.hp = 16; e.spd = 64;
    e.cd = 1.4; e.hitT = 0; e.burst = 0; e.bt = 0; }
  if (type === 'gunship'){ e.y = 150; e.w = 150; e.h = 60; e.spd = 220;  // e.y is the hull CENTER
    e.phase = 'enter'; e.pt = 1.6; e.cd = 0.5; e.hitT = 0; e.vtoggle = 0;
    e.core = 24; e.coreMax = 24;  // the core is just the finisher; the turrets are the fight
    e.turrets = [
      { ox: -58, oy: 30, hp: 6, max: 6 }, { ox: -35, oy: 36, hp: 6, max: 6 }, { ox: -12, oy: 32, hp: 6, max: 6 },
      { ox: 12, oy: 32, hp: 6, max: 6 }, { ox: 35, oy: 36, hp: 6, max: 6 }, { ox: 58, oy: 30, hp: 6, max: 6 }
    ]; }
  e.maxhp = e.hp;
  return e;
}

function genWorld(){
  const g = G;
  while (g.genX < g.camX + W + 300){
    if (Math.random() < 0.55){
      const y = Math.random() < 0.5 ? 372 : 326;
      const w = 120 + Math.random() * 130;
      g.plats.push({ x: g.genX, y, w });
      if (Math.random() < 0.45)
        g.picks.push(mkPick(randPickup(), g.genX + w / 2, y - 22));
    }
    g.genX += 300 + Math.random() * 320;
  }
  const diff = g.maxD / 900;
  // mid-boss (or the car bonus round) takes the stage: hold off on the usual rabble
  if (g.bossOn || inCar()){
    g.spawnX = Math.max(g.spawnX, g.camX + W + 240);
  } else {
    while (g.spawnX < g.camX + W + 240){
      const r = Math.random();
      let type = 'grunt';
      if (diff > 1.1 && r < 0.18) type = 'heavy';
      else if (r < 0.42) type = 'drone';
      g.ens.push(mkEnemy(type, g.spawnX));
      if (diff > 1.8 && Math.random() < 0.3) g.ens.push(mkEnemy('drone', g.spawnX + 60));
      g.spawnX += Math.max(170, 470 - diff * 45) + Math.random() * 250;
    }
  }
  if (!g.bossOn && !inCar() && g.maxD > g.nextGunship){
    g.ens.push(mkEnemy('gunship', g.camX + W + 180));
    g.nextGunship += 7000 + Math.random() * 3000;
    enterBoss('⚠ WARSHIP INBOUND ⚠', '#ff5e3a');
  } else if (!g.bossOn && !inCar() && g.maxD > g.nextBoss){
    g.ens.push(mkEnemy('midboss', g.camX + W + 140));
    g.nextBoss += 3200 + Math.random() * 1400;
    enterBoss();
  }
  if (!inCar() && g.maxD > g.nextStalker){
    g.ens.push(mkEnemy('stalker', g.camX + W + 120));
    g.nextStalker += 2600;
    addText(g.camX + W / 2, 160, 'SOMETHING IS HUNTING YOU', '#b6ff3b', 2.4);
  }
  // battle car: a parked car on the road ahead — jump in for a 10s gunner bonus round
  if (!g.bossOn && !inCar() && g.maxD > g.nextCar){
    g.cars.push({ x: g.camX + W + 160, y: GROUND, t: 0 });
    g.nextCar += 5000 + Math.random() * 2500;
    addText(g.camX + W / 2, 150, 'BATTLE CAR AHEAD', '#19e3ff', 2.4);
  }
  // ally drop: a teammate up on a high ledge with a mech parked beside them
  if (!g.bossOn && !inCar() && g.maxD > g.nextAlly){
    const bx = g.camX + W + 220;
    g.plats.push({ x: bx - 132, y: 372, w: 92 });  // a step to make the climb fair
    g.plats.push({ x: bx, y: 326, w: 174 });        // the high ledge with the prize
    g.allies.push({ x: bx + 122, y: 326, t: Math.random() * 9 });
    g.pods.push({ x: bx + 58, y: 326, t: Math.random() * 9 });
    g.nextAlly += 6500 + Math.random() * 3500;
    addText(bx + 60, 326 - 78, 'ALLY · MECH READY', '#7df9ff', 2.6);
  }
  g.plats = g.plats.filter(pl => pl.x + pl.w > g.camX - 400);
  g.allies = g.allies.filter(a => a.x > g.camX - 500);
  g.pods = g.pods.filter(po => po.x > g.camX - 500);
  g.cars = g.cars.filter(c => c.x > g.camX - 500);
}

function addText(x, y, s, col, life){ G.texts.push({ x, y, s, col, life: life || 1.2, max: life || 1.2 }); }
function burst(x, y, n, cols, spd){
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2, v = (spd || 220) * (0.3 + Math.random());
    G.parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - 60,
      life: 0.4 + Math.random() * 0.5, max: 1, size: 2 + Math.random() * 3,
      col: cols[Math.random() * cols.length | 0], grav: 1 });
  }
  if (G.parts.length > 420) G.parts.splice(0, G.parts.length - 420);
}
function ring(x, y, col){ G.parts.push({ x, y, vx: 0, vy: 0, life: 0.35, max: 0.35, size: 6, col, ring: 1, grav: 0 }); }
// pulsing red-to-orange used for OVERDRIVE accents (replaces the old rainbow)
function soloCol(){ return `hsl(${(tt * 40) % 26 | 0} 100% ${56 + 12 * Math.sin(tt * 12) | 0}%)`; }

function mult(){ const p = G.p; return p.soloT > 0 ? 4 : G.meter >= 60 ? 2 : 1; }
function award(x, y, base){
  const v = base * mult();
  G.score += v;
  addText(x, y - 30, '+' + v, mult() > 1 ? '#ffd23f' : '#9ef0ff', 0.9);
}
function addShred(n){
  const p = G.p;
  if (p.soloT > 0) return;
  G.meter = Math.min(100, G.meter + n);
  if (G.meter >= 100){
    p.soloT = 8; G.meter = 100;
    sSolo();
    addText(p.x, p.y - 90, 'OVERDRIVE!!', '#ff5e3a', 1.8);
    shake = 10;
  }
}
function tryJump(){
  const p = G.p;
  if (inCar()) return; // in the car, the jump keys aim the turret instead
  if (down(DOWN) && !p.onGround) return;
  if (down(DOWN) && p.onGround && p.y < GROUND){ p.dropT = 0.22; p.onGround = false; return; }
  if (p.onGround){ p.vy = -640; p.onGround = false; p.jumps = 1; sJump(); }
  else if (p.jumps < 2){ p.vy = -560; p.jumps = 2; sJump(); burst(p.x, p.y, 6, ['#19e3ff'], 120); }
}
function hurt(fromX){
  const p = G.p;
  if (p.iframes > 0 || p.soloT > 0 || inCar()) return;
  if (inMech()){
    p.mech--; p.iframes = 0.6; shake = 7; sMechHit();
    p.vx = p.x < fromX ? -120 : 120;
    burst(p.x, p.y - 30, 12, ['#ffd23f', '#ff9f1c', '#fff'], 220);
    if (p.mech <= 0) ejectMech();
    return;
  }
  if (p.shield > 0){
    p.shield--; p.iframes = 0.7; shake = 6; sShieldHit();
    p.vx = p.x < fromX ? -150 : 150;
    ring(p.x, p.y - 22, '#19e3ff');
    burst(p.x, p.y - 22, 12, ['#19e3ff', '#9ef0ff', '#fff'], 200);
    if (p.shield === 0){ p.shieldT = 0; addText(p.x, p.y - 70, 'SHIELD BROKEN', '#19e3ff', 1.1); }
    return;
  }
  p.hp--; p.iframes = 1.4; shake = 9; sHurt();
  p.vx = p.x < fromX ? -260 : 260; p.vy = -200; p.onGround = false;
  burst(p.x, p.y - 22, 14, ['#ff2d55', '#ff9f1c'], 260);
  if (p.hp <= 0){
    state = 'dying'; G.dieT = 1.1;
    const lines = ['GET TO THE CHOPPA... NEXT TIME.', 'IF IT BLEEDS, YOU CAN KILL IT.',
                   'THE NIGHT ALWAYS WINS. UNTIL IT DOESN\'T.', 'HE\'LL BE BACK.'];
    G.line = lines[Math.random() * lines.length | 0];
    sBoom(true); shake = 18;
    burst(p.x, p.y - 22, 60, ['#19e3ff', '#ff2d55', '#ffd23f', '#fff'], 380);
    ring(p.x, p.y - 22, '#fff');
  }
}
function killEnemy(e, i){
  G.ens.splice(i, 1);
  G.kills++;
  if (e.type === 'stalker' || e.type === 'midboss') G.bosses++;
  const beefy = e.type === 'stalker' || e.type === 'heavy' || e.type === 'midboss';
  sBoom(beefy);
  shake = Math.min(16, shake + (e.type === 'stalker' || e.type === 'midboss' ? 12 : e.type === 'flyer' ? 2 : 4));
  const cols = e.type === 'stalker' ? ['#b6ff3b', '#fff', '#ffd23f']
             : e.type === 'midboss' ? ['#c44dff', '#ff2d78', '#fff']
             : ['#ff2d55', '#ff9f1c', '#ffd23f'];
  burst(e.x, e.y - e.h / 2, e.type === 'stalker' || e.type === 'midboss' ? 50 : 22, cols, 300);
  ring(e.x, e.y - e.h / 2, cols[0]);
  const score = { grunt: 100, drone: 150, heavy: 300, flyer: 120, midboss: 1200, stalker: 2000 }[e.type];
  award(e.x, e.y - e.h, score);
  addShred({ grunt: 10, drone: 12, heavy: 18, flyer: 0, midboss: 60, stalker: 100 }[e.type]);
  if (e.type === 'midboss'){
    G.picks.push(mkPick('hp', e.x - 26, e.y - 30));
    G.picks.push(mkPick('shield', e.x, e.y - 30));
    G.picks.push(mkPick(randPickup(), e.x + 26, e.y - 30));
    addText(e.x, e.y - e.h - 20, 'MID-BOSS DOWN', '#c44dff', 1.8);
    exitBoss();
  } else if (e.type === 'stalker'){
    G.picks.push(mkPick('hp', e.x - 20, e.y - 30));
    G.picks.push(mkPick('star', e.x + 20, e.y - 30));
  } else if (e.type !== 'flyer' && Math.random() < 0.16){
    const r = Math.random();
    const type = r < 0.3 ? 'hp' : r < 0.6 ? 'spread' : r < 0.8 ? 'laser' : 'star';
    G.picks.push(mkPick(type, e.x, e.y - 26));
  }
}
function fire(){
  const p = G.p;
  if (p.fireCd > 0) return;
  if (inCar()){
    p.fireCd = 0.12;
    const a = p.carAng, sp = 720;
    const bx = p.x - 4 + Math.cos(a) * 28, by = p.y - 30 - Math.sin(a) * 28;
    G.pbul.push({ x: bx, y: by, vx: Math.cos(a) * sp, vy: -Math.sin(a) * sp, w: 10, h: 6, dmg: 2, col: '#ffd23f', life: 1.5, hit: {} });
    p.flash = 0.06; sShoot();
    return;
  }
  const solo = p.soloT > 0;
  const gx = p.x + p.facing * 32, gy = p.y - 31;
  const dmg = solo ? 2 : 1;
  if (inMech()){
    p.fireCd = (solo ? 0.08 : 0.14);
    for (const oy of [-46, -26])
      G.pbul.push({ x: p.x + p.facing * 40, y: p.y + oy, vx: 780 * p.facing, vy: 0, w: 18, h: 6, dmg: dmg * 3, col: '#ffd23f', life: 1, hit: {} });
    p.flash = 0.06; sShoot();
    return;
  }
  if (p.weapon === 'laser'){
    p.fireCd = (solo ? 0.1 : 0.26);
    G.pbul.push({ x: gx, y: gy, vx: 820 * p.facing, vy: 0, w: 26, h: 5, dmg: dmg * 3, pierce: 1, col: '#b6ff3b', life: 1.1, hit: {} });
    sLaser();
  } else if (p.weapon === 'spread'){
    p.fireCd = (solo ? 0.08 : 0.2);
    for (const a of [-0.16, 0, 0.16])
      G.pbul.push({ x: gx, y: gy, vx: Math.cos(a) * 640 * p.facing, vy: Math.sin(a) * 640, w: 10, h: 4, dmg, col: '#ff9f1c', life: 1, hit: {} });
    sShoot();
  } else if (p.weapon === 'rapid'){
    p.fireCd = (solo ? 0.035 : 0.06);
    const j = (Math.random() - 0.5) * 60;
    G.pbul.push({ x: gx, y: gy, vx: 760 * p.facing, vy: j, w: 11, h: 3, dmg, col: '#19e3ff', life: 0.9, hit: {} });
    sShoot();
  } else if (p.weapon === 'rocket'){
    p.fireCd = (solo ? 0.22 : 0.5);
    G.pbul.push({ x: gx, y: gy, vx: 520 * p.facing, vy: 0, w: 16, h: 8, dmg, rocket: 1, col: '#ff9f1c', life: 1.5, hit: {} });
    sRocket();
  } else {
    p.fireCd = (solo ? 0.055 : 0.15);
    G.pbul.push({ x: gx, y: gy, vx: 660 * p.facing, vy: 0, w: 12, h: 4, dmg, col: solo ? '#ffd23f' : '#19e3ff', life: 1, hit: {} });
    sShoot();
  }
  p.flash = 0.06;
  if (solo && G.pbul.length) G.pbul[G.pbul.length - 1].rainbow = 1;
}

// ---- mech: same controls, more power and armor, on a timer
const MECH_ARMOR = 6, MECH_TIME = 12;
function inMech(){ return G.p.mechT > 0; }
// player hitbox grows while piloting the mech
function pbox(){ const p = G.p; return inMech() ? [p.x, p.y - 30, 42, 64] : [p.x, p.y - 22, 24, 44]; }
function enterMech(){
  const p = G.p;
  p.mech = MECH_ARMOR; p.mechT = MECH_TIME; p.iframes = Math.max(p.iframes, 0.3);
  sMech(); shake = 9;
  burst(p.x, p.y - 30, 22, ['#ffd23f', '#19e3ff', '#fff'], 260);
  ring(p.x, p.y - 30, '#ffd23f');
  addText(p.x, p.y - 92, 'MECH ONLINE', '#ffd23f', 1.6);
}
function ejectMech(){
  const p = G.p;
  p.mech = 0; p.mechT = 0; p.iframes = Math.max(p.iframes, 1);
  sBoom(false); shake = 9;
  burst(p.x, p.y - 30, 26, ['#ffd23f', '#19e3ff', '#fff'], 300);
  ring(p.x, p.y - 30, '#19e3ff');
  addText(p.x, p.y - 80, 'MECH OFFLINE', '#19e3ff', 1.2);
}
// heavy landing: grounded enemies near the impact take a hit
function mechSlam(){
  const p = G.p;
  shake = Math.min(14, shake + 7); sBoom(false);
  burst(p.x, GROUND, 18, ['#ffd23f', '#19e3ff', '#fff'], 240); ring(p.x, GROUND, '#ffd23f');
  for (let j = G.ens.length - 1; j >= 0; j--){
    const e = G.ens[j];
    if (Math.abs(e.x - p.x) < 92 && e.y >= GROUND - 2){
      e.hp -= 4;
      if (e.type === 'stalker' || e.type === 'midboss') e.hitT = 0.25;
      if (e.hp <= 0) killEnemy(e, j);
    }
  }
}

// ---- battle car: a 10s bonus round. it auto-drives forward; Up/Down aim the
// turret across a 0-180 arc; J/X/Z fires. invulnerable joyride, shoot the flyers.
const CAR_TIME = 10, CAR_SPEED = 360;
function inCar(){ return G.p.carT > 0; }
function enterCar(){
  const p = G.p;
  p.carT = CAR_TIME; p.carAng = Math.PI / 3; p.facing = 1;
  p.y = GROUND; p.vy = 0; p.onGround = true;
  G.flyerT = 0.3;
  sCar(); shake = 8;
  burst(p.x, p.y - 18, 20, ['#19e3ff', '#ffd23f', '#fff'], 240);
  addText(p.x, p.y - 84, 'JOYRIDE!  ↑ ↓ AIM', '#19e3ff', 2.4);
}
function ejectCar(){
  const p = G.p;
  p.carT = 0; p.iframes = Math.max(p.iframes, 1);
  sBoom(false); shake = 6;
  burst(p.x, p.y - 18, 22, ['#19e3ff', '#ffd23f', '#fff'], 280);
  addText(p.x, p.y - 70, 'RIDE OVER', '#19e3ff', 1.2);
}

// ============================================================ update
function update(dt){
  const g = G, p = g.p;
  tt += dt;
  if (state === 'play' && !paused) g.runT += dt;
  if (state === 'dying'){
    g.dieT -= dt;
    updateFx(dt * 0.35);
    if (g.dieT <= 0){
      state = 'dead';
      if (g.score > hi){ hi = g.score; store.set('nv_hi', String(hi)); }
    }
    return;
  }
  // player
  p.animT += dt; p.fireCd -= dt; p.iframes -= dt; p.flash -= dt; p.dropT -= dt;
  if (p.soloT > 0) p.soloT -= dt;
  if (p.mechT > 0){ p.mechT -= dt; if (p.mechT <= 0) ejectMech(); }
  if (p.carT > 0){ p.carT -= dt; if (p.carT <= 0) ejectCar(); }
  // the carried weapon's clock pauses while piloting/driving, so you don't waste it
  if (p.weaponT > 0 && !inMech() && !inCar()){ p.weaponT -= dt; if (p.weaponT <= 0) p.weapon = 'std'; }
  if (p.shield > 0){ p.shieldT -= dt; if (p.shieldT <= 0){ p.shield = 0; addText(p.x, p.y - 70, 'SHIELD OUT', '#19e3ff', 1); } }
  let tvx = 0;
  if (inCar()){
    tvx = CAR_SPEED; p.facing = 1;                                  // auto-drives forward
    if (down(JUMP)) p.carAng = Math.min(Math.PI, p.carAng + 2.4 * dt); // Up raises the barrel
    if (down(DOWN)) p.carAng = Math.max(0, p.carAng - 2.4 * dt);       // Down lowers it
    // stream of flyers to shoot down
    g.flyerT -= dt;
    if (g.flyerT <= 0){ g.flyerT = 0.3 + Math.random() * 0.2; g.ens.push(mkEnemy('flyer', g.camX + W + 30 + Math.random() * 70)); }
  } else {
    if (down(LEFT)){ tvx = -250; p.facing = -1; }
    if (down(RIGHT)){ tvx = 250; p.facing = 1; }
  }
  p.vx += (tvx - p.vx) * Math.min(1, dt * 10);
  p.vy += 1750 * dt;
  const prevY = p.y, prevOnGround = p.onGround, fallV = p.vy;
  p.x += p.vx * dt; p.y += p.vy * dt;
  p.x = Math.max(g.maxD - 520 + 120, p.x);
  p.onGround = false;
  if (p.y >= GROUND){ p.y = GROUND; p.vy = 0; p.onGround = true; p.jumps = 0; }
  else if (p.vy > 0 && p.dropT <= 0){
    for (const pl of g.plats){
      if (p.x > pl.x - 4 && p.x < pl.x + pl.w + 4 && prevY <= pl.y && p.y >= pl.y){
        p.y = pl.y; p.vy = 0; p.onGround = true; p.jumps = 0; break;
      }
    }
  }
  // mech stomp: a hard landing shakes the ground and crushes anything under it
  if (inMech() && !prevOnGround && p.onGround && fallV > 520) mechSlam();
  if (down(FIRE)) fire();
  // camera + distance
  g.camX += (p.x - 300 - g.camX) * Math.min(1, dt * 7);
  g.camX = Math.max(0, g.camX);
  g.maxD = Math.max(g.maxD, p.x - 120);
  if (p.soloT <= 0) g.meter = Math.max(0, g.meter - dt * 3);
  genWorld();
  // zones: announce on entry, fire lightning in storm zones
  const zi = zoneIdx(g.maxD);
  if (zi !== g.zone){ g.zone = zi; addText(g.camX + W / 2, 120, '◇ ' + ZONES[zi].name + ' ◇', ZONES[zi].horizon, 2.6); }
  if (ZONES[zi].light > 0){
    g.boltT -= dt;
    if (g.boltT <= 0){ g.boltT = 1.6 + Math.random() * 3.2; g.flashT = 0.18; g.boltX = g.camX + Math.random() * W; sThunder(); }
  }
  if (g.flashT > 0) g.flashT -= dt;

  // enemies
  for (let i = g.ens.length - 1; i >= 0; i--){
    const e = g.ens[i];
    e.t += dt; e.cd -= dt;
    const onScreen = e.x > g.camX - 60 && e.x < g.camX + W + 60;
    e.face = p.x < e.x ? -1 : 1;
    const dx = p.x - e.x;
    if (e.type === 'grunt'){
      if (Math.abs(dx) > 360) e.x += Math.sign(dx) * e.spd * dt;
      if (onScreen && e.cd <= 0 && Math.abs(dx) < 560){
        e.cd = 1.5 + Math.random();
        aimedShot(e.x + e.face * 18, e.y - 30, 290, '#ff2d55', 8);
      }
    } else if (e.type === 'heavy'){
      if (Math.abs(dx) > 300) e.x += Math.sign(dx) * e.spd * dt;
      if (onScreen && e.cd <= 0 && Math.abs(dx) < 620){
        e.cd = 2.6; e.burst = 3; e.bt = 0;
      }
      if (e.burst > 0){ e.bt -= dt; if (e.bt <= 0){ e.bt = 0.22; e.burst--; aimedShot(e.x + e.face * 22, e.y - 34, 250, '#ff9f1c', 9); } }
    } else if (e.type === 'drone'){
      e.x -= Math.sign(e.x - p.x) * e.spd * dt * 0.6 || -e.spd * dt;
      e.y = e.baseY + Math.sin(e.t * 3) * 36;
      if (onScreen && e.cd <= 0 && Math.abs(dx) < 90){
        e.cd = 1.7;
        g.ebul.push({ x: e.x, y: e.y + 10, vx: 0, vy: 60, w: 9, h: 9, col: '#19e3ff', grav: 1 });
      }
    } else if (e.type === 'flyer'){
      e.x -= e.spd * dt;                              // streams toward/past the car
      e.y = e.baseY + Math.sin(e.t * 3 + e.vyb) * 22; // harmless target, just bobs
    } else if (e.type === 'stalker'){
      e.pt -= dt; e.hitT -= dt;
      if (e.phase === 'cloak'){
        const want = p.x + 260 * (dx > 0 ? -1 : 1);
        e.x += Math.sign(want - e.x) * e.spd * dt;
        if (e.pt <= 0){ e.phase = 'attack'; e.pt = 1.9; e.cd = 0.3; }
      } else {
        if (e.cd <= 0){ e.cd = 0.62; aimedShot(e.x + e.face * 16, e.y - 46, 260, '#b6ff3b', 14, true); }
        if (e.pt <= 0){ e.phase = 'cloak'; e.pt = 2.4 + Math.random(); }
      }
    } else if (e.type === 'midboss'){
      e.hitT -= dt;
      const adx = Math.abs(dx);
      if (adx > 340) e.x += Math.sign(dx) * e.spd * dt;            // close the gap
      else if (adx < 220) e.x -= Math.sign(dx) * e.spd * 0.7 * dt; // keep its distance
      if (onScreen && e.cd <= 0 && adx < 760){ e.cd = 1.6; e.burst = 2; e.bt = 0; }
      if (e.burst > 0){
        e.bt -= dt;
        if (e.bt <= 0){ e.bt = 0.5; e.burst--; aimedSpread(e.x + e.face * 22, e.y - 40, 300, '#c44dff', 12, 3, 0.22); }
      }
    } else if (e.type === 'gunship'){
      e.hitT -= dt; e.pt -= dt;
      // travels with the run: holds station ahead-right of the player
      e.x += ((p.x + 340) - e.x) * Math.min(1, dt * 1.4);
      const turretsLeft = e.turrets.filter(tr => tr.hp > 0).length;
      let ty = e.y;
      if (e.phase === 'enter'){
        ty = 200; if (e.pt <= 0){ e.phase = 'hover'; e.pt = 3; e.cd = 0.5; }
      } else if (e.phase === 'hover'){
        ty = 196 + Math.sin(e.t * 1.5) * 16;        // high up, raining bombs
        if (e.cd <= 0){ e.cd = 0.55; dropBomb(e, e.x + (Math.random() - 0.5) * 130); }
        if (e.pt <= 0){ e.phase = 'strafe'; e.pt = 3.4; e.cd = 0.4; }
      } else {
        ty = 348 + Math.sin(e.t * 2) * 12;          // swoops low — the damage window
        if (e.cd <= 0){
          e.cd = 0.85; e.vtoggle ^= 1;              // alternating banks keep the barrage fair
          e.turrets.forEach((tr, k) => { if (tr.hp > 0 && (k % 2) === e.vtoggle) aimedShot(e.x + tr.ox, e.y + tr.oy, 285, '#ff5e3a', 9); });
        }
        if (e.pt <= 0){ e.phase = 'hover'; e.pt = 3; e.cd = 0.3; g.ens.push(mkEnemy('drone', e.x)); }
      }
      e.y += (ty - e.y) * Math.min(1, dt * 1.6);
    }
    // contact damage
    { const pb = pbox(), cy = e.type === 'gunship' ? e.y : e.y - e.h / 2;
      if (rectsHit(pb[0], pb[1], pb[2], pb[3], e.x, cy, e.w, e.h)) hurt(e.x); }
    if (e.x < g.camX - 650){ if (e.type === 'midboss' || e.type === 'gunship') exitBoss(); g.ens.splice(i, 1); }
  }

  // player bullets
  for (let i = g.pbul.length - 1; i >= 0; i--){
    const b = g.pbul[i];
    b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
    const offscreen = b.x < g.camX - 40 || b.x > g.camX + W + 40;
    let dead = b.life <= 0 || offscreen;
    for (let j = g.ens.length - 1; j >= 0 && !dead; j--){
      const e = g.ens[j];
      if (b.hit[e.id]) continue;
      if (e.type === 'gunship'){ if (hitGunship(e, j, b)) dead = true; continue; }
      if (rectsHit(b.x, b.y, b.w, b.h, e.x, e.y - e.h / 2, e.w, e.h)){
        b.hit[e.id] = 1;
        if (b.rocket){ dead = true; break; } // detonates on contact (AoE handled below)
        let dmg = b.dmg;
        if (e.type === 'stalker' && e.phase === 'cloak') dmg = Math.max(1, dmg >> 1);
        e.hp -= dmg;
        if (e.type === 'stalker' || e.type === 'midboss') e.hitT = 0.25;
        burst(b.x, b.y, 4, [b.col, '#fff'], 140);
        if (e.hp <= 0) killEnemy(e, j);
        if (!b.pierce) dead = true;
      }
    }
    if (b.rocket && dead && !offscreen) explodeRocket(b.x, b.y, b.dmg);
    if (dead) g.pbul.splice(i, 1);
  }
  // enemy bullets
  for (let i = g.ebul.length - 1; i >= 0; i--){
    const b = g.ebul[i];
    if (b.grav) b.vy += 950 * dt;
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.y >= GROUND + 4){
      burst(b.x, GROUND, 10, [b.col, '#ff9f1c'], 200); sBoom(false);
      if (Math.abs(p.x - b.x) < 46 && p.y > GROUND - 50) hurt(b.x);
      g.ebul.splice(i, 1); continue;
    }
    { const pb = pbox(); if (rectsHit(b.x, b.y, b.w, b.h, pb[0], pb[1], pb[2], pb[3])){
      hurt(b.x); g.ebul.splice(i, 1); continue;
    } }
    if (b.x < g.camX - 60 || b.x > g.camX + W + 60 || b.y < -40) g.ebul.splice(i, 1);
  }
  // pickups
  for (let i = g.picks.length - 1; i >= 0; i--){
    const k = g.picks[i];
    k.t += dt;
    const dx = p.x - k.x, dy = (p.y - 22) - k.y;
    if (dx * dx + dy * dy < 70 * 70){ k.x += dx * dt * 6; k.y += dy * dt * 6; }
    if (rectsHit(k.x, k.y, k.w, k.h, p.x, p.y - 22, 26, 46)){
      sPickup();
      if (k.type === 'hp'){ p.hp = Math.min(4, p.hp + 1); addText(k.x, k.y, '+HP', '#ff6b9d', 1); }
      if (k.type === 'star'){ addShred(35); addText(k.x, k.y, 'SHRED +35', '#ffd23f', 1); }
      if (k.type === 'spread'){ p.weapon = 'spread'; p.weaponT = 12; addText(k.x, k.y, 'SPREAD', '#ff9f1c', 1); }
      if (k.type === 'laser'){ p.weapon = 'laser'; p.weaponT = 12; addText(k.x, k.y, 'LASER', '#b6ff3b', 1); }
      if (k.type === 'rapid'){ p.weapon = 'rapid'; p.weaponT = 12; addText(k.x, k.y, 'RAPID', '#19e3ff', 1); }
      if (k.type === 'rocket'){ p.weapon = 'rocket'; p.weaponT = 14; addText(k.x, k.y, 'ROCKETS', '#ff9f1c', 1); }
      if (k.type === 'shield'){ p.shield = 3; p.shieldT = 16; addText(k.x, k.y, 'SHIELD', '#19e3ff', 1); }
      burst(k.x, k.y, 10, ['#fff', '#ffd23f'], 160);
      g.picks.splice(i, 1);
    } else if (k.x < g.camX - 500) g.picks.splice(i, 1);
  }
  // mech pods — climb to one and step in to pilot it (no magnet; it stays parked)
  for (let i = g.pods.length - 1; i >= 0; i--){
    const po = g.pods[i];
    po.t += dt;
    const pb = pbox();
    if (!inMech() && !inCar() && rectsHit(po.x, po.y - 28, 46, 56, pb[0], pb[1], pb[2], pb[3])){
      enterMech(); g.pods.splice(i, 1);
    }
  }
  // battle cars — parked on the road; step in to start the bonus round
  for (let i = g.cars.length - 1; i >= 0; i--){
    const c = g.cars[i];
    c.t += dt;
    const pb = pbox();
    if (!inMech() && !inCar() && rectsHit(c.x, c.y - 16, 54, 30, pb[0], pb[1], pb[2], pb[3])){
      enterCar(); g.cars.splice(i, 1);
    }
  }
  // allies just wave you over; advance their idle animation
  for (const a of g.allies) a.t += dt;
  updateFx(dt);
}
function explodeRocket(x, y, dmg){
  sBoom(true); shake = Math.min(16, shake + 9);
  burst(x, y, 28, ['#ff9f1c', '#ffd23f', '#fff'], 340);
  ring(x, y, '#ffd23f');
  const R = 95;
  for (let j = G.ens.length - 1; j >= 0; j--){
    const e = G.ens[j];
    if (e.type === 'gunship') continue; // the gunship takes damage only on its weak points
    const ex = e.x - x, ey = (e.y - e.h / 2) - y;
    if (ex * ex + ey * ey < R * R){
      let d = dmg * 3;
      if (e.type === 'stalker' && e.phase === 'cloak') d = Math.max(1, d >> 1);
      e.hp -= d;
      if (e.type === 'stalker' || e.type === 'midboss') e.hitT = 0.25;
      if (e.hp <= 0) killEnemy(e, j);
    }
  }
}
function dropBomb(e, x){
  G.ebul.push({ x, y: e.y + 10, vx: (Math.random() - 0.5) * 30, vy: 90, w: 11, h: 11, col: '#ff9f1c', grav: 1 });
}
// player bullet vs gunship: turrets first, then the exposed core. returns true if the bullet is spent.
function hitGunship(e, j, b){
  const turretsLeft = e.turrets.filter(tr => tr.hp > 0).length;
  const dmg = b.rocket ? b.dmg * 3 : b.dmg;
  for (const tr of e.turrets){
    if (tr.hp <= 0) continue;
    if (rectsHit(b.x, b.y, b.w, b.h, e.x + tr.ox, e.y + tr.oy, 30, 26)){
      b.hit[e.id] = 1; e.hitT = 0.2;
      tr.hp -= dmg; burst(b.x, b.y, 4, [b.col, '#fff'], 140);
      if (tr.hp <= 0){
        burst(e.x + tr.ox, e.y + tr.oy, 22, ['#ff5e3a', '#ffd23f', '#fff'], 260);
        ring(e.x + tr.ox, e.y + tr.oy, '#ff5e3a'); sBoom(false);
        shake = Math.min(14, shake + 5); award(e.x + tr.ox, e.y + tr.oy, 250); addShred(8);
        if (e.turrets.every(t => t.hp <= 0)){
          addText(e.x, e.y - 34, 'CORE EXPOSED!', '#c44dff', 1.8); shake = Math.min(16, shake + 6);
        }
      }
      return b.rocket || !b.pierce;
    }
  }
  if (turretsLeft === 0 && rectsHit(b.x, b.y, b.w, b.h, e.x, e.y, 50, 42)){
    b.hit[e.id] = 1; e.hitT = 0.2;
    e.core -= dmg; burst(b.x, b.y, 5, ['#c44dff', '#fff'], 160);
    if (e.core <= 0) killGunship(e, j);
    return b.rocket || !b.pierce;
  }
  return false;
}
function killGunship(e, idx){
  G.ens.splice(idx, 1);
  G.kills++; G.bosses++;
  sBoom(true); shake = 18;
  for (let k = 0; k < 6; k++) ring(e.x + (Math.random() - 0.5) * 120, e.y + (Math.random() - 0.5) * 50, ['#ff5e3a', '#ffd23f', '#c44dff', '#fff'][k % 4]);
  burst(e.x, e.y, 80, ['#ff5e3a', '#ffd23f', '#c44dff', '#fff'], 420);
  award(e.x, e.y, 5000); addShred(100);
  G.picks.push(mkPick('hp', e.x - 40, GROUND - 30));
  G.picks.push(mkPick('shield', e.x, GROUND - 30));
  G.picks.push(mkPick(randPickup(), e.x + 40, GROUND - 30));
  addText(e.x, e.y - 30, 'WARSHIP DOWN', '#ff5e3a', 2.4);
  exitBoss();
}
function aimedShot(x, y, spd, col, size, plasma){
  const p = G.p;
  const dx = p.x - x, dy = (p.y - 24) - y, len = Math.hypot(dx, dy) || 1;
  G.ebul.push({ x, y, vx: dx / len * spd, vy: dy / len * spd, w: size, h: size, col, plasma });
}
function aimedSpread(x, y, spd, col, size, count, spreadA){
  const p = G.p;
  const base = Math.atan2((p.y - 24) - y, p.x - x);
  for (let i = 0; i < count; i++){
    const a = base + (i - (count - 1) / 2) * spreadA;
    G.ebul.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, w: size, h: size, col, plasma: true });
  }
}
function updateFx(dt){
  for (let i = G.parts.length - 1; i >= 0; i--){
    const q = G.parts[i];
    q.life -= dt;
    if (q.grav) q.vy += 700 * dt;
    q.x += q.vx * dt; q.y += q.vy * dt;
    if (q.life <= 0) G.parts.splice(i, 1);
  }
  for (let i = G.texts.length - 1; i >= 0; i--){
    const q = G.texts[i];
    q.life -= dt; q.y -= 26 * dt;
    if (q.life <= 0) G.texts.splice(i, 1);
  }
  shake = Math.max(0, shake - dt * 30);
}
function rectsHit(x1, y1, w1, h1, x2, y2, w2, h2){
  return Math.abs(x1 - x2) * 2 < w1 + w2 && Math.abs(y1 - y2) * 2 < h1 + h2;
}

// ============================================================ draw
// ---- zones: the world evolves with distance, each a distinct synthwave mood
const ZONE_LEN = 3600; // ~360m per zone before it crossfades into the next
const ZONES = [
  { name: 'NEON CITY',
    sky: ['#0b0716', '#1d0b33', '#3d1145', '#12081f', '#0a0614'],
    orb: ['#ffd23f', '#ff7b2d', '#ff2d78'], orbA: 1, glow: '#ff5e3a',
    skyline1: '#160a26', skyline2: '#0e0618', horizon: '#ff2d78',
    floorTop: '#190b2e', floorBot: '#0a0516', gridH: '#ff2d78', gridV: '#19e3ff', edge: '#19e3ff',
    star: 0.8, rain: 0, light: 0 },
  { name: 'OCEAN DRIVE',
    sky: ['#04121a', '#062b3a', '#0a4a55', '#06212b', '#03121a'],
    orb: ['#ffe08a', '#ff9f5a', '#ff5e8a'], orbA: 0.95, glow: '#ff8a5a',
    skyline1: '#06222b', skyline2: '#04161c', horizon: '#19e3ff',
    floorTop: '#062029', floorBot: '#03121a', gridH: '#19c6ff', gridV: '#39ffd2', edge: '#39ffd2',
    star: 0.4, rain: 1, light: 0 },
  { name: 'NIGHT STORM',
    sky: ['#05060f', '#0b1030', '#161a44', '#0a0c22', '#04050e'],
    orb: ['#3a4a7a', '#26305a', '#161a3a'], orbA: 0.22, glow: '#3a4a7a',
    skyline1: '#0a0c22', skyline2: '#060814', horizon: '#6ab0ff',
    floorTop: '#0a0c20', floorBot: '#04050e', gridH: '#5a7aff', gridV: '#6ab0ff', edge: '#9ecbff',
    star: 0.5, rain: 0.5, light: 1 },
  { name: 'CRIMSON MOON',
    sky: ['#120406', '#2e0810', '#4a0e18', '#1a0608', '#0e0406'],
    orb: ['#ff8a7a', '#c4304a', '#5a0e2a'], orbA: 1, glow: '#ff3b4a',

    floorTop: '#1e0708', floorBot: '#0e0406', gridH: '#ff3b4a', gridV: '#ff7b4a', edge: '#ff7b4a',
    star: 0.7, rain: 0, light: 0 }
];
function hx(h){ return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }
function mix(a, b, t){ return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t]; }
function rgb(c, a){ return a == null ? `rgb(${c[0] | 0},${c[1] | 0},${c[2] | 0})` : `rgba(${c[0] | 0},${c[1] | 0},${c[2] | 0},${a})`; }
function blendZones(A, B, t){
  const cm = k => mix(hx(A[k]), hx(B[k]), t);
  const arr = k => A[k].map((h, i) => mix(hx(h), hx(B[k][i]), t));
  const n = k => A[k] + (B[k] - A[k]) * t;
  return { sky: arr('sky'), orb: arr('orb'), orbA: n('orbA'), glow: cm('glow'),
    skyline1: cm('skyline1'), skyline2: cm('skyline2'), horizon: cm('horizon'),
    floorTop: cm('floorTop'), floorBot: cm('floorBot'), gridH: cm('gridH'), gridV: cm('gridV'), edge: cm('edge'),
    starA: n('star'), rain: n('rain'), light: n('light') };
}
function zoneIdx(d){ const i = Math.floor(d / ZONE_LEN); return ((i % ZONES.length) + ZONES.length) % ZONES.length; }
function zoneAt(d){
  const z = d / ZONE_LEN, fl = Math.floor(z), frac = z - fl;
  const A = ZONES[((fl % ZONES.length) + ZONES.length) % ZONES.length];
  const B = ZONES[(((fl + 1) % ZONES.length) + ZONES.length) % ZONES.length];
  return blendZones(A, B, frac < 0.86 ? 0 : (frac - 0.86) / 0.14); // crossfade over the last 14%
}
let PAL = zoneAt(0);
function line(x1, y1, x2, y2){ cx.beginPath(); cx.moveTo(x1, y1); cx.lineTo(x2, y2); cx.stroke(); }

function drawSky(camX){
  const P = PAL;
  // sky gradient
  const sg = cx.createLinearGradient(0, 0, 0, H);
  const pos = [0, 0.42, 0.62, 0.78, 1];
  for (let i = 0; i < 5; i++) sg.addColorStop(pos[i], rgb(P.sky[i]));
  cx.fillStyle = sg; cx.fillRect(0, 0, W, H);
  // stars
  cx.fillStyle = '#fff';
  for (let i = 0; i < 70; i++){
    const sx = (i * 137.7 - camX * 0.02) % W, x = sx < 0 ? sx + W : sx;
    const y = (i * 89.3) % (HORIZON - 40);
    const tw = 0.3 + 0.7 * Math.abs(Math.sin(tt * 1.5 + i));
    cx.globalAlpha = tw * P.starA;
    cx.fillRect(x, y, i % 7 === 0 ? 2 : 1, i % 7 === 0 ? 2 : 1);
  }
  cx.globalAlpha = 1;
  // sun / moon
  if (P.orbA > 0.03){
    const sx = W * 0.64, sy = 218, r = 105;
    const og = cx.createLinearGradient(0, sy - r, 0, sy + r);
    og.addColorStop(0, rgb(P.orb[0])); og.addColorStop(0.5, rgb(P.orb[1])); og.addColorStop(1, rgb(P.orb[2]));
    cx.save();
    cx.globalAlpha = P.orbA;
    cx.beginPath(); cx.arc(sx, sy, r, 0, Math.PI * 2); cx.clip();
    cx.shadowColor = rgb(P.glow); cx.shadowBlur = 40;
    cx.fillStyle = og; cx.fillRect(sx - r, sy - r, r * 2, r * 2);
    cx.shadowBlur = 0;
    cx.globalAlpha = 1; cx.fillStyle = sg; // scanline cutouts blend back to sky
    for (let i = 0; i < 7; i++){ const y = sy + 8 + i * (10 + i * 2.4); cx.fillRect(sx - r, y, r * 2, 3 + i * 1.7); }
    cx.restore();
  }
  // skylines
  drawSkyline(camX, 0.12, HORIZON + 4, rgb(P.skyline1), 120, 90, 17);
  drawSkyline(camX, 0.28, HORIZON + 4, rgb(P.skyline2), 90, 130, 31);
  // horizon glow
  cx.strokeStyle = rgb(P.horizon); cx.lineWidth = 2;
  cx.shadowColor = rgb(P.horizon); cx.shadowBlur = 12;
  line(0, HORIZON + 4, W, HORIZON + 4);
  cx.shadowBlur = 0;
}
function drawSkyline(camX, par, baseY, col, sp, hmax, seed){
  cx.fillStyle = col;
  const n = Math.ceil(W / sp) + 2;
  const start = Math.floor(camX * par / sp);
  for (let i = start; i < start + n; i++){
    const rnd = Math.abs(Math.sin(i * seed * 1.37) * 10000) % 1;
    const h = 24 + rnd * hmax;
    const bw = sp * (0.55 + (Math.abs(Math.sin(i * 7.7)) % 1) * 0.4);
    const x = i * sp - camX * par;
    cx.fillRect(x, baseY - h, bw, h);
    if (rnd > 0.55){ // antenna
      cx.fillRect(x + bw / 2, baseY - h - 14, 2, 14);
    }
    // a few lit windows
    cx.fillStyle = 'rgba(255,210,63,.25)';
    for (let wY = 0; wY < 3; wY++){
      if ((Math.abs(Math.sin(i * 13.1 + wY * 5)) % 1) > 0.6)
        cx.fillRect(x + 6 + wY * 9, baseY - h + 8 + wY * 14, 3, 4);
    }
    cx.fillStyle = col;
  }
}
function drawFloor(camX){
  const P = PAL;
  // floor band
  const fg = cx.createLinearGradient(0, GROUND, 0, H);
  fg.addColorStop(0, rgb(P.floorTop)); fg.addColorStop(1, rgb(P.floorBot));
  cx.fillStyle = fg; cx.fillRect(0, GROUND, W, H - GROUND);
  // mid band between horizon and floor: faint haze
  const hz2 = cx.createLinearGradient(0, HORIZON, 0, GROUND);
  hz2.addColorStop(0, rgb(P.gridH, 0.07)); hz2.addColorStop(1, 'rgba(0,0,0,0)');
  cx.fillStyle = hz2; cx.fillRect(0, HORIZON, W, GROUND - HORIZON);
  // grid: horizontal depth lines
  cx.lineWidth = 1.5;
  for (let i = 1; i <= 6; i++){
    const f = i / 6, y = GROUND + (H - GROUND) * f * f;
    cx.strokeStyle = rgb(P.gridH, 0.25 + f * 0.45);
    line(0, y, W, y);
  }
  // grid: vertical lines fanning toward bottom
  const sp = 88, off = ((camX % sp) + sp) % sp;
  cx.strokeStyle = rgb(P.gridV, 0.4);
  for (let k = -1; k <= W / sp + 1; k++){
    const topX = k * sp - off;
    const botX = W / 2 + (topX - W / 2) * 1.45;
    line(topX, GROUND, botX, H);
  }
  // floor edge
  cx.strokeStyle = rgb(P.edge); cx.lineWidth = 2;
  cx.shadowColor = rgb(P.edge); cx.shadowBlur = 8;
  line(0, GROUND, W, GROUND);
  cx.shadowBlur = 0;
}
function drawWeather(){
  const P = PAL;

    cx.strokeStyle = `rgba(160,205,255,${0.32 * P.rain})`; cx.lineWidth = 1.5;
    for (let i = 0; i < 70; i++){
      const ph = ((tt / 0.85) + i * 0.137) % 1;
      const x = ((i * 139.7) + ph * 40) % W, y = -20 + ph * (H + 40);
      cx.beginPath(); cx.moveTo(x, y); cx.lineTo(x - 6, y + 16); cx.stroke();
    }
  }
}
function drawPlat(pl, camX){

function drawHero(){
  const p = G.p;
  if (state === 'dying' || state === 'dead') return;
  if (inCar()){ drawCar(); return; }

function drawFx(){
  for (const q of G.parts){
    const x = q.x - G.camX, a = Math.max(0, q.life / q.max);
    cx.globalAlpha = a;
    if (q.ring){
      cx.strokeStyle = q.col; cx.lineWidth = 3;
      cx.beginPath(); cx.arc(x, q.y, q.size + (1 - a) * 70, 0, Math.PI * 2); cx.stroke();
    } else {
      cx.fillStyle = q.col;
      cx.fillRect(x - q.size / 2, q.y - q.size / 2, q.size, q.size);
    }
  }
  cx.globalAlpha = 1;
  cx.textAlign = 'center'; cx.font = '700 15px ui-monospace, monospace';
  for (const q of G.texts){
    cx.globalAlpha = Math.min(1, q.life / q.max * 2);
    cx.fillStyle = q.col;
    cx.fillText(q.s, q.x - G.camX, q.y);
  }
  cx.globalAlpha = 1;
}
function drawHUD(){
  const p = G.p;
  // hp
  for (let i = 0; i < 4; i++){
    const x = 20 + i * 30;
    cx.fillStyle = i < p.hp ? '#ff2d55' : 'rgba(255,45,85,.15)';
    if (i < p.hp){ cx.shadowColor = '#ff2d55'; cx.shadowBlur = 8; }
    cx.fillRect(x, 18, 24, 9);
    cx.shadowBlur = 0;
  }
  // weapon / mech / car tag
  let row = 44;
  if (inCar()){
    cx.fillStyle = '#19e3ff'; cx.font = '700 12px ui-monospace, monospace'; cx.textAlign = 'left';
    cx.shadowColor = '#19e3ff'; cx.shadowBlur = 7;
    cx.fillText('JOYRIDE ' + Math.ceil(p.carT) + 's   ↑↓ AIM', 20, row);
    cx.shadowBlur = 0; row += 18;
  } else if (inMech()){
    cx.fillStyle = '#ffd23f'; cx.font = '700 12px ui-monospace, monospace'; cx.textAlign = 'left';
    cx.fillText('MECH ' + Math.ceil(p.mechT) + 's', 20, row);
    for (let i = 0; i < MECH_ARMOR; i++){
      cx.fillStyle = i < p.mech ? '#ffd23f' : 'rgba(255,210,63,.18)';
      if (i < p.mech){ cx.shadowColor = '#ffd23f'; cx.shadowBlur = 7; }
      cx.fillRect(98 + i * 9, row - 9, 7, 9); cx.shadowBlur = 0;
    }
    row += 18;
  } else if (p.weapon !== 'std'){
    const wcol = { laser: '#b6ff3b', spread: '#ff9f1c', rapid: '#7df9ff', rocket: '#ff5e3a' }[p.weapon] || '#ff9f1c';
    cx.fillStyle = wcol;
    cx.font = '700 12px ui-monospace, monospace'; cx.textAlign = 'left';
    cx.fillText(p.weapon.toUpperCase() + ' ' + Math.ceil(p.weaponT) + 's', 20, row);
    row += 18;
  }
  // shield charges
  if (p.shield > 0){
    cx.fillStyle = '#4dffd2'; cx.font = '700 12px ui-monospace, monospace'; cx.textAlign = 'left';
    cx.fillText('SHIELD', 20, row);
    for (let i = 0; i < 3; i++){
      cx.fillStyle = i < p.shield ? '#4dffd2' : 'rgba(77,255,210,.18)';
      if (i < p.shield){ cx.shadowColor = '#4dffd2'; cx.shadowBlur = 7; }
      cx.fillRect(74 + i * 13, row - 9, 10, 9); cx.shadowBlur = 0;
    }
  }
  // score
  cx.textAlign = 'right'; cx.font = '700 18px ui-monospace, monospace';
  cx.fillStyle = '#e8e4f0';
  cx.fillText(String(G.score).padStart(7, '0'), W - 20, 30);
  cx.font = '700 11px ui-monospace, monospace'; cx.fillStyle = 'rgba(232,228,240,.55)';
  cx.fillText('HI ' + String(Math.max(hi, G.score)).padStart(7, '0') + '   ' + (G.maxD / 10 | 0) + 'm', W - 20, 46);
  if (mult() > 1){
    cx.fillStyle = '#ffd23f'; cx.font = 'italic 900 16px ui-monospace, monospace';
    cx.fillText('x' + mult(), W - 20, 64);
  }
  // shred meter
  const mw = 280, mx = W / 2 - mw / 2, my = H - 30;
  const frac = p.soloT > 0 ? p.soloT / 8 : G.meter / 100;
  cx.fillStyle = 'rgba(255,255,255,.08)'; cx.fillRect(mx, my, mw, 8);
  const mg = cx.createLinearGradient(mx, 0, mx + mw, 0);
  mg.addColorStop(0, '#ff2d78'); mg.addColorStop(1, '#ffd23f');
  cx.fillStyle = p.soloT > 0 ? soloCol() : mg;
  if (frac > 0.55 || p.soloT > 0){ cx.shadowColor = p.soloT > 0 ? '#ff5e3a' : '#ffd23f'; cx.shadowBlur = 10; }
  cx.fillRect(mx, my, mw * frac, 8);
  cx.shadowBlur = 0;
  cx.strokeStyle = 'rgba(255,255,255,.3)'; cx.lineWidth = 1; cx.strokeRect(mx, my, mw, 8);
  cx.textAlign = 'center'; cx.font = '700 11px ui-monospace, monospace';
  cx.fillStyle = p.soloT > 0 ? '#ff5e3a' : 'rgba(232,228,240,.6)';
  cx.fillText(p.soloT > 0 ? '!! OVERDRIVE !!' : 'SHRED', W / 2, my - 6);
  // boss health bar
  if (G.bossOn){
    const boss = G.ens.find(e => e.type === 'midboss' || e.type === 'gunship');
    const bw = 360, bx = W / 2 - bw / 2, by = 72;
    if (boss && boss.type === 'midboss'){
      const f = Math.max(0, boss.hp / boss.maxhp);
      cx.fillStyle = 'rgba(0,0,0,.5)'; cx.fillRect(bx - 2, by - 2, bw + 4, 12);
      cx.fillStyle = '#3a1145'; cx.fillRect(bx, by, bw, 8);
      cx.fillStyle = '#c44dff'; cx.shadowColor = '#c44dff'; cx.shadowBlur = 10;
      cx.fillRect(bx, by, bw * f, 8); cx.shadowBlur = 0;
      cx.strokeStyle = 'rgba(255,255,255,.4)'; cx.lineWidth = 1; cx.strokeRect(bx, by, bw, 8);
      cx.textAlign = 'center'; cx.font = '700 11px ui-monospace, monospace'; cx.fillStyle = '#c44dff';
      cx.fillText('◆ MID-BOSS ◆', W / 2, by - 5);
    } else if (boss && boss.type === 'gunship'){
      const tl = boss.turrets.filter(tr => tr.hp > 0).length, exposed = tl === 0;
      const f = Math.max(0, boss.core / boss.coreMax);
      cx.fillStyle = 'rgba(0,0,0,.5)'; cx.fillRect(bx - 2, by - 2, bw + 4, 12);
      cx.fillStyle = '#3a1145'; cx.fillRect(bx, by, bw, 8);
      cx.fillStyle = exposed ? '#ff5e3a' : 'rgba(255,94,58,.35)';
      if (exposed){ cx.shadowColor = '#ff5e3a'; cx.shadowBlur = 10; }
      cx.fillRect(bx, by, bw * f, 8); cx.shadowBlur = 0;
      cx.strokeStyle = 'rgba(255,255,255,.4)'; cx.lineWidth = 1; cx.strokeRect(bx, by, bw, 8);
      cx.textAlign = 'center'; cx.font = '700 11px ui-monospace, monospace'; cx.fillStyle = '#ff5e3a';
      cx.fillText(exposed ? '◆ WARSHIP — CORE EXPOSED ◆' : '◆ WARSHIP — TURRETS ' + tl + ' ◆', W / 2, by - 5);
    }
  }
  // now-playing track
  cx.textAlign = 'left'; cx.font = '700 10px ui-monospace, monospace';
  cx.fillStyle = 'rgba(232,228,240,.4)';
  cx.fillText('♪ ' + song.name, 20, H - (muted ? 30 : 16));
  if (muted){
    cx.fillStyle = 'rgba(232,228,240,.4)'; cx.font = '700 11px ui-monospace, monospace';
    cx.fillText('MUTED [M]', 20, H - 16);
  }
}
function chromeText(s, x, y, size){
  cx.save();
  cx.textAlign = 'center'; cx.textBaseline = 'alphabetic';
  cx.font = `italic 900 ${size}px "Arial Black", Impact, sans-serif`;
  cx.shadowColor = '#ff2d78'; cx.shadowBlur = 26;
  cx.fillStyle = '#ff2d78';
  cx.fillText(s, x + 3, y + 3);
  cx.shadowBlur = 0;
  const g = cx.createLinearGradient(0, y - size, 0, y);
  g.addColorStop(0, '#ffffff'); g.addColorStop(0.42, '#9ef0ff');
  g.addColorStop(0.52, '#15526b'); g.addColorStop(0.62, '#dffaff'); g.addColorStop(1, '#3aa7c8');
  cx.fillStyle = g;
  cx.fillText(s, x, y);
  cx.lineWidth = 1.4; cx.strokeStyle = 'rgba(255,255,255,.55)';
  cx.strokeText(s, x, y);
  cx.restore();
}
function drawTitle(){
  drawSky(tt * 60); drawFloor(tt * 60);
  chromeText('NEON', W / 2, 170, 84);
  chromeText('VENGEANCE', W / 2, 254, 84);
  cx.textAlign = 'center';
  cx.font = 'italic 700 16px ui-monospace, monospace';
  cx.fillStyle = '#ffd23f';
  cx.fillText('ONE MAN. ONE SHRED METER. NO MERCY.', W / 2, 292);
  cx.font = '700 14px ui-monospace, monospace';
  cx.fillStyle = 'rgba(232,228,240,.85)';
  const rows = [
    '←→ / A D   move        SPACE / W   jump (x2)',
    'J / X / Z   shoot       P  pause     M  mute',
    'Grab guns: SPREAD · LASER · RAPID · ROCKETS · SHIELD',
    'Fill the SHRED meter. The solo does the rest.'
  ];
  rows.forEach((r, i) => cx.fillText(r, W / 2, 340 + i * 22));
  if (((tt * 1.6) | 0) % 2){
    cx.font = '900 22px ui-monospace, monospace';
    cx.fillStyle = '#19e3ff'; cx.shadowColor = '#19e3ff'; cx.shadowBlur = 14;
    cx.fillText('PRESS ENTER', W / 2, 446);
    cx.shadowBlur = 0;
  }
  if (hi > 0){
    cx.font = '700 13px ui-monospace, monospace'; cx.fillStyle = 'rgba(232,228,240,.5)';
    cx.fillText('HI ' + String(hi).padStart(7, '0'), W / 2, 478);
  }
}
function drawDead(){
  cx.fillStyle = 'rgba(5,3,10,.72)'; cx.fillRect(0, 0, W, H);
  chromeText('GAME OVER', W / 2, 210, 64);
  cx.textAlign = 'center';
  cx.font = 'italic 700 16px ui-monospace, monospace';
  cx.fillStyle = '#ffd23f';
  cx.fillText(G.line, W / 2, 252);
  cx.font = '700 20px ui-monospace, monospace'; cx.fillStyle = '#e8e4f0';
  cx.fillText('SCORE  ' + String(G.score).padStart(7, '0'), W / 2, 304);
  cx.font = '700 14px ui-monospace, monospace';
  cx.fillStyle = G.score >= hi && G.score > 0 ? '#ffd23f' : 'rgba(232,228,240,.6)';
  cx.fillText(G.score >= hi && G.score > 0 ? '★ NEW HIGH SCORE ★' : 'HI ' + String(hi).padStart(7, '0'), W / 2, 332);
  // discreet run stats
  const s = G.runT | 0, tstr = (s / 60 | 0) + ':' + String(s % 60).padStart(2, '0');
  cx.font = '700 12px ui-monospace, monospace';
  cx.fillStyle = 'rgba(232,228,240,.45)';
  cx.fillText(tstr + '   ·   ' + (G.maxD / 10 | 0) + 'm   ·   ' + G.kills + ' kills   ·   ' + G.bosses + ' bosses', W / 2, 360);
  if (((tt * 1.6) | 0) % 2){
    cx.fillStyle = '#19e3ff';
    cx.fillText('ENTER  run it back      ESC  title', W / 2, 396);
  }
}
function drawPaused(){
  cx.fillStyle = 'rgba(5,3,10,.66)'; cx.fillRect(0, 0, W, H);
  chromeText('PAUSED', W / 2, 240, 56);
  cx.textAlign = 'center';
  cx.font = '700 15px ui-monospace, monospace';
  cx.fillStyle = 'rgba(232,228,240,.85)';
  cx.fillText('Go take the call. The grid will wait.', W / 2, 286);
  cx.fillStyle = '#19e3ff';
  cx.fillText('P  resume      R  reset      M  mute', W / 2, 322);
}
function draw(){
  PAL = zoneAt(state === 'title' || !G ? 0 : G.maxD); // current zone palette for this frame
  cx.save();
  if (shake > 0.3 && state !== 'dead')
    cx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  if (state === 'title'){
    drawTitle();
  } else {
    const camX = G.camX;
    drawSky(camX); drawFloor(camX); drawWeather();
    for (const pl of G.plats) drawPlat(pl, camX);
    for (const k of G.picks) drawPick(k);
    for (const po of G.pods) drawMechPod(po);
    for (const c of G.cars) drawCarPod(c);
    for (const a of G.allies) drawAlly(a);
    for (const e of G.ens) drawEnemy(e);
    drawHero();
    drawBullets();
    drawFx();
    // lightning flash in storm zones
    if (G.flashT > 0){
      const a = G.flashT / 0.18;
      cx.fillStyle = `rgba(200,225,255,${0.42 * a})`; cx.fillRect(0, 0, W, H);
      let xx = G.boltX - camX, yy = 0;
      cx.strokeStyle = `rgba(225,238,255,${0.9 * a})`; cx.lineWidth = 2;
      cx.shadowColor = '#9ecbff'; cx.shadowBlur = 12;
      cx.beginPath(); cx.moveTo(xx, 0);
      for (let s = 0; s < 6; s++){ yy += HORIZON / 6; xx += Math.sin(s * 9.7 + G.boltX) * 18; cx.lineTo(xx, yy); }
      cx.stroke(); cx.shadowBlur = 0;
    }
    // mid-boss bathes the grid in hostile red light
    if (G.bossOn){
      cx.fillStyle = `rgba(150,10,45,${0.14 + 0.05 * Math.sin(tt * 4)})`;
      cx.fillRect(0, 0, W, H);
    }
    drawHUD();
    if (state === 'dead') drawDead();
    else if (paused) drawPaused();
  }
  cx.restore();
}

// ============================================================ loop
let last = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  let dt = Math.min(1 / 30, (now - last) / 1000);
  last = now;
  if (state === 'title') tt += dt;
  else if (!paused || state === 'dead') update(dt);
  draw();
}
requestAnimationFrame(loop);
</script>
